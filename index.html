<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bible Quiz - 1 Timothy 1</title>

<style>
body {
  font-family: Arial;
  background:#f4f4f4;
  padding:20px;
}

.container {
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1,h2 { text-align:center; }

.question {
  margin:15px 0;
  padding:10px;
  background:#fafafa;
  border-radius:6px;
}

.correct { color:green; font-weight:bold; }
.wrong { color:red; }

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

#timer {
  text-align:center;
  font-size:20px;
  font-weight:bold;
  color:#e74c3c;
}
</style>

</head>
<body>

<div class="container">

<h1>Bible Quiz</h1>
<h2>1 Timothy Chapter 1</h2>

<div id="start">
  <button onclick="startLevel()">Start Quiz</button>
</div>

<div id="quiz" style="display:none;">
  <div id="timer"></div>
  <div id="questions"></div>
  <button onclick="submitQuiz()">Submit</button>
</div>

<div id="result"></div>

</div>

<script>

let level = 0;
let timeLeft;
let timerInterval;

const levels = [

/* LEVEL 1 (20 QUESTIONS) */
[
{q:"Paul is an apostle by whose command?", o:["Men","Church","God & Christ","Timothy"], a:2},
{q:"Timothy is described as Paul's?", o:["Friend","Son in faith","Brother","Servant"], a:1},
{q:"Paul greets with?", o:["Love","Peace","Grace mercy peace","Joy"], a:2},
{q:"Timothy stayed in?", o:["Rome","Ephesus","Corinth","Galatia"], a:1},
{q:"Purpose of staying?", o:["Travel","Teach truth","Stop false doctrine","Collect money"], a:2},
{q:"False teachers focus on?", o:["Prayer","Myths","Evangelism","Worship"], a:1},
{q:"These lead to?", o:["Faith","Speculation","Growth","Love"], a:1},
{q:"Goal of teaching?", o:["Power","Love","Authority","Wisdom"], a:1},
{q:"Love comes from?", o:["Heart only","Faith only","Pure heart + conscience + faith","Prayer"], a:2},
{q:"Some turned to?", o:["Prayer","Talk","Meaningless talk","Truth"], a:2},
{q:"They want to teach?", o:["Gospel","Law","Faith","Prayer"], a:1},
{q:"They lack?", o:["Faith","Understanding","Power","Authority"], a:1},
{q:"Law is good if?", o:["Used harshly","Used well","Used publicly","Used loudly"], a:1},
{q:"Law is not for?", o:["Sinners","Lawless","Righteous","Rebels"], a:2},
{q:"Law is for?", o:["Holy","Righteous","Lawless","Faithful"], a:2},
{q:"Law includes?", o:["Teachers","Murderers","Leaders","Pastors"], a:1},
{q:"Also for?", o:["Liars","Faithful","Holy","Angels"], a:0},
{q:"Contrary to?", o:["Culture","Doctrine","Law","People"], a:1},
{q:"Gospel is?", o:["Simple","Glorious","Earthly","Human"], a:1},
{q:"Gospel belongs to?", o:["Paul","Church","God","People"], a:2}
],

/* LEVEL 2 */
[
{q:"Paul thanks?", o:["Church","Jesus","Timothy","Friends"], a:1},
{q:"Why?", o:["Money","Strength","Wisdom","Fame"], a:1},
{q:"Christ saw Paul as?", o:["Weak","Faithful","Lost","Poor"], a:1},
{q:"Paul was appointed to?", o:["Teach","Serve","Rule","Lead"], a:1},
{q:"Paul was once?", o:["Holy","Blasphemer","Teacher","King"], a:1},
{q:"Also?", o:["Gentle","Violent","Kind","Soft"], a:1},
{q:"Mercy given because?", o:["Prayer","Ignorance","Faith","Works"], a:1},
{q:"Grace was?", o:["Small","Abundant","Weak","Hidden"], a:1},
{q:"With faith and?", o:["Hope","Love","Power","Joy"], a:1},
{q:"Christ came to?", o:["Judge","Save sinners","Teach","Rule"], a:1},
{q:"Paul says he is?", o:["Best","Least","Worst","Great"], a:2},
{q:"Mercy shows?", o:["Power","Patience","Law","Judgment"], a:1},
{q:"Example to?", o:["Believers","Leaders","People","All"], a:0},
{q:"God is?", o:["Mortal","Immortal","Weak","Visible"], a:1},
{q:"God is also?", o:["Many","Only God","Spirit","King"], a:1},
{q:"To God be?", o:["Money","Honor","Wisdom","Strength"], a:1},
{q:"Forever?", o:["Yes","No","Maybe","Later"], a:0},
{q:"Timothy receives?", o:["Gift","Command","Book","Blessing"], a:1},
{q:"Command based on?", o:["Law","Prophecy","Faith","Church"], a:1},
{q:"Purpose?", o:["Teach","Fight good fight","Travel","Write"], a:1}
],

/* LEVEL 3 */
[
{q:"Hold onto?", o:["Power","Faith","Wisdom","Law"], a:1},
{q:"Also keep?", o:["Money","Conscience","Strength","Fear"], a:1},
{q:"Some rejected?", o:["Faith","Truth","Law","Grace"], a:0},
{q:"Result?", o:["Growth","Shipwreck","Power","Success"], a:1},
{q:"Example?", o:["Peter","John","Hymenaeus","Paul"], a:2},
{q:"Also?", o:["Luke","Alexander","James","Mark"], a:1},
{q:"Given to?", o:["Church","Satan","Leaders","People"], a:1},
{q:"Purpose?", o:["Punish","Teach","Remove","Ignore"], a:1},
{q:"Teach not to?", o:["Lie","Blaspheme","Steal","Fight"], a:1},
{q:"Teaching goal?", o:["Love","Power","Money","Growth"], a:0},
{q:"Heart must be?", o:["Strong","Pure","Bold","Wise"], a:1},
{q:"Faith must be?", o:["Big","Sincere","Fast","Strong"], a:1},
{q:"False teaching brings?", o:["Truth","Confusion","Faith","Hope"], a:1},
{q:"Law reveals?", o:["Truth","Sin","Love","Peace"], a:1},
{q:"Christ saves?", o:["Holy","Sinners","Strong","Leaders"], a:1},
{q:"Paul shows?", o:["Power","Mercy","Law","Faith"], a:1},
{q:"God is King?", o:["Temporary","Eternal","Weak","Human"], a:1},
{q:"God is?", o:["Visible","Invisible","Weak","Many"], a:1},
{q:"Honor lasts?", o:["Time","Forever","Short","Little"], a:1},
{q:"Timothy must?", o:["Quit","Stay faithful","Hide","Travel"], a:1}
],

/* LEVEL 4 */
[
{q:"False teaching opposes?", o:["Truth","Doctrine","Faith","Love"], a:1},
{q:"Doctrine must be?", o:["Strong","Sound","Big","Wide"], a:1},
{q:"Law targets?", o:["Righteous","Lawbreakers","Faithful","Leaders"], a:1},
{q:"Grace is?", o:["Earned","Free","Weak","Hidden"], a:1},
{q:"Paul’s past shows?", o:["Failure","Mercy","Law","Power"], a:1},
{q:"Faith produces?", o:["Love","Money","Power","Fear"], a:0},
{q:"Wrong teachers seek?", o:["Truth","Authority","God","Love"], a:1},
{q:"Real teaching gives?", o:["Speculation","Love","Fear","Confusion"], a:1},
{q:"Conscience must be?", o:["Ignored","Good","Weak","Hidden"], a:1},
{q:"Faith without conscience?", o:["Strong","Shipwreck","Good","Right"], a:1},
{q:"Christ’s mission?", o:["Judge","Save","Rule","Destroy"], a:1},
{q:"Paul’s life?", o:["Example","Warning","Failure","Test"], a:0},
{q:"God deserves?", o:["Money","Honor","Power","Wisdom"], a:0},
{q:"God is only?", o:["Spirit","God","King","Light"], a:1},
{q:"Timothy must fight?", o:["War","Battle","Good fight","Enemies"], a:2},
{q:"Hold onto faith?", o:["Yes","No","Maybe","Later"], a:0},
{q:"Rejecting truth leads to?", o:["Power","Failure","Shipwreck","Joy"], a:2},
{q:"Correction is for?", o:["Punishment","Learning","Fear","Removal"], a:1},
{q:"Teaching builds?", o:["Fear","Love","Power","Money"], a:1},
{q:"Final call?", o:["Quit","Stay faithful","Hide","Stop"], a:1}
]

];

function startLevel(){
  document.getElementById("start").style.display="none";
  loadLevel();
}

function loadLevel(){
  document.getElementById("quiz").style.display="block";
  document.getElementById("result").innerHTML="";
  let qHTML="";
  levels[level].forEach((q,i)=>{
    qHTML+=`<div class="question"><p>${i+1}. ${q.q}</p>`;
    q.o.forEach((opt,j)=>{
      qHTML+=`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
    });
    qHTML+="</div>";
  });
  document.getElementById("questions").innerHTML=qHTML;
  startTimer();
}

function startTimer(){
  timeLeft=600;
  timerInterval=setInterval(()=>{
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    document.getElementById("timer").innerText=`Time: ${m}:${s<10?"0":""}${s}`;
    timeLeft--;
    if(timeLeft<0){ clearInterval(timerInterval); submitQuiz(); }
  },1000);
}

function submitQuiz(){
  clearInterval(timerInterval);
  let score=0;
  let wrong=[];
  levels[level].forEach((q,i)=>{
    let sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(sel && parseInt(sel.value)===q.a){
      score++;
    } else {
      wrong.push(i+1);
    }
  });

  let resultHTML=`<h2>Score: ${score}/20</h2>`;

  if(score>=15){
    resultHTML+=`<button onclick="nextLevel()">Next Level</button>`;
  } else {
    resultHTML+=`<button onclick="loadLevel()">Retry</button>`;
  }

  resultHTML+=`<p>Wrong Questions: ${wrong.join(", ")}</p>`;

  document.getElementById("result").innerHTML=resultHTML;
}

function nextLevel(){
  level++;
  if(level>=levels.length){
    document.getElementById("result").innerHTML="<h2>🎉 You Completed All Levels!</h2>";
    return;
  }
  loadLevel();
}

</script>

</body>
</html>
