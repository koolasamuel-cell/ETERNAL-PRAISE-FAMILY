<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EPF - Express Yourself System HD</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
    :root {
        --sky-blue: #00d2ff;
        --crystal-blue: #3a7bd5;
        --deep-ocean: #001f3f;
        --bright-text: #ffffff;
        --neon-cyan: #00ffff;
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --bg-gradient: radial-gradient(circle at center, #3a7bd5 0%, #001f3f 100%);
    }
    
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--bright-text);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-image: 
            linear-gradient(rgba(0, 31, 63, 0.8), rgba(0, 31, 63, 0.8)),
            url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80&w=1000');
        background-size: cover;
        background-position: center;
        padding-bottom: 100px;
    }

    body::before {
        content: "EPF";
        position: fixed;
        bottom: 10%;
        right: 5%;
        font-size: 10rem;
        font-weight: 900;
        opacity: 0.03;
        color: white;
        z-index: -1;
        transform: rotate(-15deg);
        pointer-events: none;
    }

    .header-container {
        text-align: center;
        margin-bottom: 40px;
        perspective: 1000px;
    }

    h1 {
        font-size: clamp(2.5rem, 10vw, 4.5rem);
        font-weight: 900;
        margin: 0;
        text-transform: uppercase;
        color: var(--bright-text);
        text-shadow: 0 10px 20px rgba(0, 255, 255, 0.4), 0 0 100px rgba(255,255,255,0.2);
        letter-spacing: -2px;
        transform: translateZ(50px);
    }

    h2 {
        font-size: 1.2rem;
        letter-spacing: 6px;
        color: var(--neon-cyan);
        margin: 0;
        text-transform: uppercase;
        font-weight: 800;
        opacity: 0.9;
    }

    h3 {
        font-size: 1.2rem;
        color: var(--bright-text);
        text-align: center;
        margin: 20px 0;
        letter-spacing: 2px;
    }

    .container {
        width: 100%;
        max-width: 650px;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 30px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        margin-bottom: 30px;
        box-sizing: border-box;
    }

    label {
        display: block;
        font-size: 0.8rem;
        color: var(--neon-cyan);
        margin: 20px 0 8px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 1.5px;
    }

    input {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        box-sizing: border-box;
        font-size: 1.1rem;
        transition: 0.3s;
    }

    input:focus {
        outline: none;
        border-color: var(--neon-cyan);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-top: 15px;
    }

    .box {
        background: rgba(0, 0, 0, 0.2);
        padding: 15px;
        border-radius: 18px;
    }

    .submit {
        background: linear-gradient(135deg, var(--sky-blue) 0%, var(--crystal-blue) 100%);
        color: var(--deep-ocean);
        font-weight: 900;
        font-size: 1.1rem;
        padding: 20px;
        border-radius: 15px;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        width: 100%;
        margin-top: 25px;
        transition: 0.3s;
    }

    .submit:hover {
        transform: translateY(-3px);
        filter: brightness(1.2);
    }

    .logout {
        background: rgba(255, 50, 50, 0.2);
        color: #ff6b6b;
        border: 1px solid rgba(255, 50, 50, 0.3);
        padding: 8px 15px;
        font-weight: 800;
        float: right;
        border-radius: 10px;
        cursor: pointer;
    }

    /* CUSTOM NOTIFICATION STYLES */
    #modalOverlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(10px);
    }
    .modal-box {
        background: var(--glass-bg);
        border: 1px solid var(--neon-cyan);
        padding: 30px;
        border-radius: 20px;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
    }
    .modal-box p { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; color: white; }
    .modal-btn {
        background: var(--neon-cyan);
        color: var(--deep-ocean);
        border: none;
        padding: 10px 25px;
        border-radius: 10px;
        font-weight: 900;
        text-transform: uppercase;
        cursor: pointer;
        margin: 5px;
    }
    .modal-btn.cancel { background: #ff6b6b; color: white; }

    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    td { 
        background: rgba(255, 255, 255, 0.05); 
        padding: 15px; 
        text-align: center; 
    }
    td:first-child { border-radius: 15px 0 0 15px; color: var(--neon-cyan); font-weight: 900; }
    td:last-child { border-radius: 0 15px 15px 0; font-size: 1.2rem; font-weight: 900; color: var(--sky-blue); }
    
    .first td { 
        background: rgba(0, 255, 255, 0.1);
        border-top: 1px solid var(--neon-cyan);
        border-bottom: 1px solid var(--neon-cyan);
    }

    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 15px 0;
        background: rgba(0, 31, 63, 0.8);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--glass-border);
        text-align: center;
        z-index: 100;
    }

    .copy-text { font-weight: 800; letter-spacing: 2px; color: var(--bright-text); font-size: 0.9rem; text-transform: uppercase; }
    .designer-text { font-size: 0.7rem; color: var(--neon-cyan); opacity: 0.7; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <p id="modalMsg"></p>
        <button class="modal-btn" id="modalOk">OK</button>
        <button class="modal-btn cancel" id="modalCancel" style="display:none;">CANCEL</button>
    </div>
</div>

<div class="header-container">
    <h2>Eternal Praise Family</h2>
    <h1>Express Yourself</h1>
</div>

<div id="app" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    
    <div id="loginSection" class="container">
        <h3>SYSTEM ACCESS</h3>
        <label>Identify Yourself</label>
        <input id="loginName" placeholder="Enter Name">
        <label>Passcode</label>
        <input type="password" id="loginPass" placeholder="••••">
        <button id="loginBtn" class="submit">Authorize</button>
        <div id="loginMsg" style="color: #ff6b6b; text-align: center; margin-top: 15px; font-weight: bold;"></div>
    </div>

    <div id="scoreForm" class="container" style="display:none;">
        <button class="logout" id="logoutBtn">EXIT</button>
        <h3>JUDGE PANEL</h3>
        
        <label>Active Judge</label>
        <input id="judge" readonly style="background: transparent; border: none; color: var(--neon-cyan); font-weight: 900; font-size: 1.5rem; padding-left: 0;">

        <label>Contestant Name</label>
        <input id="nameInput" placeholder="Type name here..." oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">

        <div class="grid">
            <div class="box"><label>Pitch (20)</label><input type="number" id="pitch" placeholder="1-20" oninput="v(this, 20)"></div>
            <div class="box"><label>Diction (15)</label><input type="number" id="diction" placeholder="1-15" oninput="v(this, 15)"></div>
            <div class="box"><label>Rhythm (15)</label><input type="number" id="rhythm" placeholder="1-15" oninput="v(this, 15)"></div>
            <div class="box"><label>Mic (10)</label><input type="number" id="mic" placeholder="1-10" oninput="v(this, 10)"></div>
            <div class="box"><label>Stage (15)</label><input type="number" id="stage" placeholder="1-15" oninput="v(this, 15)"></div>
            <div class="box"><label>Delivery (10)</label><input type="number" id="delivery" placeholder="1-10" oninput="v(this, 10)"></div>
            <div class="box"><label>Creative (10)</label><input type="number" id="creativity" placeholder="1-10" oninput="v(this, 10)"></div>
            <div class="box"><label>Impact (5)</label><input type="number" id="impact" placeholder="1-5" oninput="v(this, 5)"></div>
        </div>

        <button class="submit" id="submitBtn">Confirm Score</button>
        <div id="status" style="text-align: center; color: var(--neon-cyan); margin-top: 15px; font-weight: 800;"></div>
    </div>

    <div class="container">
        <h3 style="color: var(--neon-cyan);">🏆 LIVE STANDINGS</h3>
        <table>
            <thead>
                <tr style="color: var(--sky-blue); font-size: 0.7rem; letter-spacing: 2px;">
                    <th>POS</th><th>CONTESTANT</th><th>AVG</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
    </div>
</div>

<footer>
    <div class="copy-text">© ETERNAL PRAISE FAMILY</div>
    <div class="designer-text">DESIGNED BY KOOLA</div>
</footer>

<script>
const APP_URL = "https://script.google.com/macros/s/AKfycbwjOXag9UeSwCbhIB7JdVDZS4PDr-f9xSsDF1SptIDh6_ret-qBIPcWIhDGrBVsQiNe/exec";

// --- CUSTOM MODAL SYSTEM ---
function showModal(msg, isConfirm = false) {
    return new Promise((resolve) => {
        modalMsg.innerText = msg;
        modalOverlay.style.display = "flex";
        modalCancel.style.display = isConfirm ? "inline-block" : "none";
        
        modalOk.onclick = () => { modalOverlay.style.display = "none"; resolve(true); };
        modalCancel.onclick = () => { modalOverlay.style.display = "none"; resolve(false); };
    });
}

// 1. Block 'e', '+', '-' keys
document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('keydown', (e) => {
        if (['e', 'E', '+', '-'].includes(e.key)) e.preventDefault();
    });
});

// 2. Custom Neon Notification for 0 score
async function v(input, max) {
    let val = input.value;
    if (val === "0") {
        await showModal("Score cannot be zero!");
        input.value = "";
        return;
    }
    if (parseFloat(val) > max) input.value = max;
}

function showPanel(user){
    document.getElementById("judge").value = user.name.toUpperCase();
    document.getElementById("scoreForm").style.display="block";
    document.getElementById("loginSection").style.display="none";
    loadBoard();
}

(function(){
    const user = sessionStorage.getItem("user");
    if(user) showPanel(JSON.parse(user));
})();

loginBtn.onclick = async () => {
    const name = loginName.value.trim();
    const password = loginPass.value.trim();
    if(!name || !password) return;
    loginMsg.innerText = "AUTHENTICATING...";
    const res = await fetch(APP_URL, { method:"POST", body: new URLSearchParams({action:"login", name, password}) });
    const user = await res.json();
    if(user.success) { sessionStorage.setItem("user", JSON.stringify(user)); showPanel(user); }
    else loginMsg.innerText = user.message;
};

submitBtn.onclick = async () => {
    const user = JSON.parse(sessionStorage.getItem("user"));
    const contestant = nameInput.value.trim();
    
    if(!contestant) return showModal("Please enter the Contestant Name!");

    const scoreFields = [
        { id: "pitch", name: "Pitch" }, { id: "diction", name: "Diction" },
        { id: "rhythm", name: "Rhythm" }, { id: "mic", name: "Mic" },
        { id: "stage", name: "Stage" }, { id: "delivery", name: "Delivery" },
        { id: "creativity", name: "Creative" }, { id: "impact", name: "Impact" }
    ];

    for (let field of scoreFields) {
        const val = document.getElementById(field.id).value;
        if (val === "" || parseFloat(val) <= 0) {
            await showModal(`Please complete the form: "${field.name}" is missing!`);
            document.getElementById(field.id).focus();
            return;
        }
    }

    const go = await showModal(`Confirm submission for ${contestant}?`, true);
    if(!go) return;

    status.innerText = "TRANSMITTING TO CLOUD...";
    const data = {
        contestant, judge: user.name, role: user.role,
        pitch: +pitch.value, tone: +diction.value,
        rhythm: +rhythm.value, mic: +mic.value,
        stage: +stage.value, communication: +delivery.value,
        creativity: +creativity.value, impact: +impact.value
    };

    const res = await fetch(APP_URL, { method:"POST", body: new URLSearchParams(data) });
    const result = await res.json();
    if(result.success) { 
        await showModal("SUCCESS ✔ DATA SAVED"); 
        location.reload(); 
    } else {
        await showModal(result.error);
    }
};

async function loadBoard(){
    try {
        const res = await fetch(APP_URL+"?p=board");
        const data = await res.json();
        boardBody.innerHTML = data.map((d,i)=> `
            <tr class="${i==0?'first':''}">
                <td>#${i+1}</td>
                <td style="text-align: left;">
                    <div style="font-weight:900; font-size:1.1rem; color:white;">${d.name}</div>
                    <div style="font-size:0.6rem; color:var(--neon-cyan); opacity:0.8; font-weight:bold;">VOTED BY: ${d.judges.join(" | ")}</div>
                </td>
                <td>${d.avg.toFixed(2)}</td>
            </tr>`).join('');
    } catch(e) { console.log("Update pending..."); }
}

logoutBtn.onclick = () => { sessionStorage.clear(); location.reload(); };
setInterval(loadBoard, 15000);
loadBoard();
</script>
</body>
</html>
